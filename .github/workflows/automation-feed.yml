name: automation-feed

on:
  schedule:
    - cron: '0 6 * * *'  # daily 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: automation-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "andyrbek2709@gmail.com"
          git config user.name  "Andrey"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests feedparser openai aiohttp

      - name: Mark status=starting
        run: |
          mkdir -p enghub-main/public/data
          python -c "import sys, pathlib; sys.path.insert(0,'scripts'); from _status import update; update(status='scraping', current_step='Запуск пайплайна', progress_pct=0, commit=True)"

      - name: Scrape feeds
        id: scrape
        run: python scripts/scrape_feeds.py

      - name: AI process pains
        id: process
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/process_pains.py

      - name: Commit final outputs
        if: success()
        run: |
          git add data/seen.json data/raw_items.json \
                  enghub-main/public/data/parsing.json \
                  enghub-main/public/data/status.json 2>/dev/null || true
          git pull --rebase --autostash origin main || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(parsing): daily refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin HEAD:main
          fi

      - name: Mark status=failed on error
        if: failure()
        run: |
          python -c "import sys, pathlib; sys.path.insert(0,'scripts'); from _status import update; update(status='failed', current_step='Workflow упал', error='see Actions log', progress_pct=0, commit=False)" || true
          git add enghub-main/public/data/status.json 2>/dev/null || true
          git commit -m "chore(parsing): mark failed" 2>/dev/null || true
          git push origin HEAD:main 2>/dev/null || true
          exit 1
