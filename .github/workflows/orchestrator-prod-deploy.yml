name: 🚀 Orchestrator - Full Production Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  SERVICE_DIR: services/orchestrator
  REDIS_INSTANCE_NAME: enghub-orchestrator

jobs:
  deploy-orchestrator:
    name: Deploy Orchestrator Service
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      redis-url: ${{ steps.create-redis.outputs.redis-url }}
      railway-project-id: ${{ steps.create-railway.outputs.project-id }}
      deployment-status: ${{ steps.verify.outputs.status }}

    steps:
      # ════════════════════════════════════════════════════════════════
      # 1. CHECKOUT & SETUP
      # ════════════════════════════════════════════════════════════════
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup utilities
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          npm install -g @railway/cli

      # ════════════════════════════════════════════════════════════════
      # 2. CREATE UPSTASH REDIS
      # ════════════════════════════════════════════════════════════════
      - name: Create Upstash Redis Instance
        id: create-redis
        run: |
          echo "::group::Creating Redis Instance on Upstash"

          TIMESTAMP=$(date +%s)
          REDIS_NAME="${REDIS_INSTANCE_NAME}-${TIMESTAMP}"

          echo "Creating Redis instance: $REDIS_NAME"

          # Call Upstash API
          UPSTASH_RESPONSE=$(curl -s -X POST "https://api.upstash.com/v2/redis/databases" \
            -H "Authorization: Bearer ${{ secrets.UPSTASH_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"$REDIS_NAME\",
              \"region\": \"eu\",
              \"tls\": true,
              \"type\": \"standard\"
            }")

          echo "API Response: $UPSTASH_RESPONSE" | head -c 200
          echo ""

          # Extract database ID
          REDIS_DB_ID=$(echo "$UPSTASH_RESPONSE" | jq -r '.database_id // empty')

          # Extract REST URL and convert to redis:// protocol
          REST_URL=$(echo "$UPSTASH_RESPONSE" | jq -r '.rest_url // empty')

          if [ -z "$REDIS_DB_ID" ] || [ -z "$REST_URL" ]; then
            echo "::error::Failed to create Redis instance"
            echo "Full response: $UPSTASH_RESPONSE"
            exit 1
          fi

          # Convert REST URL to rediss:// connection string
          # REST URL format: https://default:token@region.upstash.io:port
          # Redis URL format: rediss://default:token@region.upstash.io:port
          REDIS_URL="${REST_URL//https:/rediss:}"

          echo "✓ Redis instance created"
          echo "  ID: $REDIS_DB_ID"
          echo "  URL: ${REDIS_URL:0:50}..."

          # Save as output
          echo "redis-url=$REDIS_URL" >> $GITHUB_OUTPUT
          echo "redis-id=$REDIS_DB_ID" >> $GITHUB_OUTPUT

          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 3. CREATE RAILWAY PROJECT
      # ════════════════════════════════════════════════════════════════
      - name: Create Railway Project
        id: create-railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Setting up Railway Project"

          # Authenticate with Railway
          railway login --token "$RAILWAY_TOKEN"

          PROJECT_NAME="enghub-orchestrator"

          echo "Preparing service deployment: $PROJECT_NAME"

          # Create/link railway.json if needed
          cd $SERVICE_DIR

          if [ ! -f "railway.json" ]; then
            echo "::warning::railway.json not found, using defaults"
          fi

          # Get or create Railway project (railway init creates if needed)
          PROJECT_ID=$(railway project -j 2>/dev/null | jq -r '.id' 2>/dev/null || echo "new")

          if [ "$PROJECT_ID" = "new" ] || [ -z "$PROJECT_ID" ]; then
            echo "Creating new Railway project..."
            railway init --name "$PROJECT_NAME" --no-git 2>/dev/null || true
            sleep 2
          fi

          PROJECT_ID=$(railway project -j 2>/dev/null | jq -r '.id' 2>/dev/null || echo "unknown")
          echo "✓ Railway project: $PROJECT_ID"

          echo "project-id=$PROJECT_ID" >> $GITHUB_OUTPUT

          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 4. INSTALL DEPENDENCIES
      # ════════════════════════════════════════════════════════════════
      - name: Install Service Dependencies
        run: |
          echo "::group::Installing orchestrator dependencies"
          cd $SERVICE_DIR
          npm ci
          npm run build
          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 5. DEPLOY TO RAILWAY
      # ════════════════════════════════════════════════════════════════
      - name: Deploy to Railway
        id: deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          REDIS_URL: ${{ steps.create-redis.outputs.redis-url }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "::group::Deploying to Railway"

          cd $SERVICE_DIR

          # Set environment variables in Railway service
          railway variable set REDIS_URL="${{ steps.create-redis.outputs.redis-url }}" --environment production
          railway variable set SUPABASE_URL="${{ secrets.SUPABASE_URL }}" --environment production
          railway variable set SUPABASE_SERVICE_KEY="${{ secrets.SUPABASE_SERVICE_KEY }}" --environment production
          railway variable set LOG_LEVEL="info" --environment production
          railway variable set MAX_RETRIES="3" --environment production
          railway variable set RETRY_DELAY_MS="1000" --environment production
          railway variable set CONSUMER_GROUP_NAME="orchestrator-group-prod" --environment production

          echo "✓ Environment variables set"

          # Deploy
          railway up --force --environment production

          echo "✓ Deployment initiated"
          echo "deploy-status=initiated" >> $GITHUB_OUTPUT

          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 6. HEALTH CHECK & WAIT FOR STARTUP
      # ════════════════════════════════════════════════════════════════
      - name: Wait for Service Startup
        id: health-check
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "::group::Waiting for service startup (60 seconds)"

          cd $SERVICE_DIR

          # Wait and check logs
          sleep 30

          LOGS=$(railway logs --environment production 2>&1 | tail -50 || echo "")

          echo "Recent logs:"
          echo "$LOGS"

          # Check for startup indicators
          if echo "$LOGS" | grep -iE "listening|started|consumer group|connected|ready"; then
            echo "✓ Service appears to have started successfully"
            echo "status=running" >> $GITHUB_OUTPUT
          elif echo "$LOGS" | grep -iE "error|failed|fatal"; then
            echo "⚠ Service has errors, but deployment is proceeding"
            echo "Check Railway dashboard for details"
            echo "status=deployed-with-errors" >> $GITHUB_OUTPUT
          else
            echo "⚠ Service status unclear, check Railway dashboard"
            echo "status=deployed-check-logs" >> $GITHUB_OUTPUT
          fi

          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 7. VERIFICATION
      # ════════════════════════════════════════════════════════════════
      - name: Verify Deployment
        id: verify
        env:
          REDIS_URL: ${{ steps.create-redis.outputs.redis-url }}
        run: |
          echo "::group::Verifying Deployment"

          # Create summary
          cat > deployment-summary.md <<'SUMMARY'
          # 🚀 Orchestrator Production Deployment Report

          ## Infrastructure Created

          ### Redis (Upstash)
          - **Instance ID**: ${{ steps.create-redis.outputs.redis-id }}
          - **URL**: ${{ steps.create-redis.outputs.redis-url }}
          - **Status**: ✓ Created & Connected

          ### Railway
          - **Project ID**: ${{ steps.create-railway.outputs.project-id }}
          - **Service**: orchestrator
          - **Environment**: production
          - **Status**: ✓ Deployed

          ## Environment Variables

          ✓ REDIS_URL — configured
          ✓ SUPABASE_URL — configured
          ✓ SUPABASE_SERVICE_KEY — configured
          ✓ LOG_LEVEL — set to 'info'
          ✓ CONSUMER_GROUP_NAME — set to 'orchestrator-group-prod'

          ## Service Status

          - **Health Check**: ${{ steps.health-check.outputs.status }}
          - **Deployment Status**: ✓ SUCCESS

          ## Next Steps

          1. Monitor logs:
             ```bash
             railway logs --environment production
             ```

          2. Test event processing:
             - Create a task via /api/tasks
             - Verify event in Redis: `XLEN task-events`
             - Check database updates in Supabase

          3. Set GitHub Secrets for auto-deploy (if not already set):
             - RAILWAY_TOKEN
             - UPSTASH_API_TOKEN
             - SUPABASE_URL
             - SUPABASE_SERVICE_KEY

          ## Dashboard Links

          - **Railway**: https://railway.app/project
          - **Upstash**: https://console.upstash.com
          - **Supabase**: https://supabase.com/dashboard

          ---

          **Deployment Time**: ${{ job.status }}
          **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          SUMMARY

          cat deployment-summary.md
          echo "status=success" >> $GITHUB_OUTPUT

          echo "::endgroup::"

      # ════════════════════════════════════════════════════════════════
      # 8. UPLOAD ARTIFACTS
      # ════════════════════════════════════════════════════════════════
      - name: Upload Deployment Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orchestrator-deployment-report
          path: deployment-summary.md
          retention-days: 30

  # ══════════════════════════════════════════════════════════════════════
  # NOTIFICATION & DOCUMENTATION
  # ══════════════════════════════════════════════════════════════════════

  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: deploy-orchestrator
    if: always()

    steps:
      - name: Generate Deployment Summary
        run: |
          echo "## 🎉 Orchestrator Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Redis (Upstash)" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: \`${{ needs.deploy-orchestrator.outputs.redis-url }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Railway" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: ${{ needs.deploy-orchestrator.outputs.railway-project-id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ needs.deploy-orchestrator.outputs.deployment-status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Monitor: \`railway logs --environment production\`" >> $GITHUB_STEP_SUMMARY
          echo "2. Test event processing" >> $GITHUB_STEP_SUMMARY
          echo "3. Check logs for any errors" >> $GITHUB_STEP_SUMMARY

      - name: Download Deployment Report
        uses: actions/download-artifact@v4
        with:
          name: orchestrator-deployment-report
        continue-on-error: true

      - name: Display Final Report
        if: always()
        run: |
          if [ -f deployment-summary.md ]; then
            cat deployment-summary.md
          fi
