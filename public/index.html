Вот пример HTML и CSS кода, который создает зеленый сайт с красной кнопкой с текстом "Стоп! Не продавать":

```html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зеленый сайт</title>
    <style>
        body {
            background-color: green;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: Arial, sans-serif;
        }
        .button {
            background-color: red;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <button class="button">Стоп! Не продавать</button>
</body>
</html>
```

Скопируй этот код в файл с расширением `.html`, открой его в браузере, и ты увидишь зеленый фон и красную кнопку с нужным текстом!
