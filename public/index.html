<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Современный сайт</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    line-height: 1.6;
    color: #333;
    background: #f9f9f9;
  }
  header {
    background: #0077ff;
    color: white;
    padding: 1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header .logo {
    font-weight: 700;
    font-size: 1.5rem;
  }
  nav {
    display: flex;
    gap: 1.5rem;
  }
  nav a {
    color: white;
    text-decoration: none;
    font-weight: 600;
    transition: color 0.3s;
  }
  nav a:hover {
    color: #aaddff;
  }
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  .hero {
    display: flex;
    gap: 2rem;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 3rem;
  }
  .hero-text {
    flex: 1 1 300px;
  }
  .hero-text h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #0077ff;
  }
  .hero-text p {
    font-size: 1.1rem;
  }
  .hero-image {
    flex: 1 1 300px;
  }
  .hero-image img {
    width: 100%;
    height: auto;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
  }
  footer {
    background: #222;
    color: #ddd;
    text-align: center;
    padding: 1.5rem 1rem;
    margin-top: 4rem;
    font-size: 0.9rem;
  }
</style>
</head>
<body>
<header>
  <div class="logo">MySite</div>
  <nav>
    <a href="#home">Главная</a>
    <a href="#about">О нас</a>
    <a href="#services">Услуги</a>
    <a href="#contact">Контакты</a>
  </nav>
</header>
<main>
  <section class="hero" id="home">
    <div class="hero-text">
      <h1>Современный и красивый сайт</h1>
      <p>Мы создаём современные, адаптивные и впечатляющие веб-сайты, которые помогут вашему бизнесу выделиться в сети.</p>
    </div>
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Современный веб дизайн" />
    </div>
  </section>
</main>
<footer>
  &copy; 2024 MySite. Все права защищены.
</footer>
</body>
</html>
