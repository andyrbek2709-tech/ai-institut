<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Современный сайт</title>
<style>
  * {
    box-sizing: border-box;
  }
  body {
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f9f9f9;
    color: #333;
  }
  header {
    background: #004aad;
    color: white;
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 1000;
  }
  header nav a {
    color: white;
    text-decoration: none;
    margin-left: 1.5rem;
    font-weight: 600;
    transition: color 0.3s ease;
  }
  header nav a:hover {
    color: #fdd835;
  }
  .logo {
    font-size: 1.5rem;
    font-weight: 700;
  }
  main {
    max-width: 1200px;
    margin: 2rem auto;
    padding: 0 1rem;
  }
  .hero {
    display: flex;
    align-items: center;
    gap: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .hero-text {
    flex: 1 1 300px;
  }
  .hero-text h1 {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #004aad;
  }
  .hero-text p {
    font-size: 1.1rem;
    line-height: 1.5;
    margin-bottom: 1.5rem;
  }
  .hero-text button {
    background-color: #fdd835;
    border: none;
    padding: 0.75rem 1.5rem;
    font-size: 1rem;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    color: #333;
    transition: background-color 0.3s ease;
  }
  .hero-text button:hover {
    background-color: #ffeb3b;
  }
  .hero-image {
    flex: 1 1 300px;
  }
  .hero-image img {
    max-width: 100%;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }
  footer {
    background: #222;
    color: #bbb;
    text-align: center;
    padding: 1.5rem 1rem;
    margin-top: 3rem;
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    header {
      flex-direction: column;
      align-items: flex-start;
    }
    header nav {
      margin-top: 0.5rem;
    }
    .hero {
      flex-direction: column;
      text-align: center;
    }
    .hero-text, .hero-image {
      flex: none;
      width: 100%;
    }
  }
</style>
</head>
<body>
<header>
  <div class="logo">MyModernSite</div>
  <nav>
    <a href="#home">Главная</a>
    <a href="#about">О нас</a>
    <a href="#services">Услуги</a>
    <a href="#contact">Контакты</a>
  </nav>
</header>
<main>
  <section class="hero" id="home">
    <div class="hero-text">
      <h1>Добро пожаловать на современный сайт</h1>
      <p>Мы создаем красивые и удобные решения для веба, используя передовые технологии и лучшие практики дизайна.</p>
      <button>Узнать больше</button>
    </div>
    <div class="hero-image">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=800" alt="Современный дизайн" />
    </div>
  </section>
</main>
<footer>
  &copy; 2024 MyModernSite. Все права защищены.
</footer>
</body>
</html>
