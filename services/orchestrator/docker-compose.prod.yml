version: '3.8'

services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enghub-orchestrator
    environment:
      # Remote Redis (Upstash)
      REDIS_URL: ${REDIS_URL}

      # Supabase
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}

      # Orchestrator
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_MS: ${RETRY_DELAY_MS:-1000}
      CONSUMER_GROUP_NAME: ${CONSUMER_GROUP_NAME:-orchestrator-group}

      # Optional: Telegram
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

    restart: unless-stopped

    # Health check for Orchestrator (checks if it can connect to Redis)
    healthcheck:
      test: ["CMD", "node", "-e", "require('ioredis').createClient(process.env.REDIS_URL).ping().then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Networks
    networks:
      - enghub

networks:
  enghub:
    driver: bridge
