version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./services/calculation-engine
      dockerfile: Dockerfile
    container_name: calculation-engine
    ports:
      - "8000:8000"
    environment:
      - DEBUG=true
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - LOG_LEVEL=DEBUG
    volumes:
      - ./services/calculation-engine:/app
    networks:
      - enghub-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./apps/calculations-platform
      dockerfile: Dockerfile
    container_name: calculations-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - enghub-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  enghub-network:
    driver: bridge
